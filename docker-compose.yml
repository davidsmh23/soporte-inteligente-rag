services:
  # Base de datos vectorial
  chromadb:
    image: chromadb/chroma:0.4.24
    ports:
      - "8033:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

  # API Backend (FastAPI + LangChain + RAG)
  backend:
    image: davidsmh233/soporte-inteligente-rag-backend
    build:
      context: ./backend
    ports:
      - "8502:8000"
    volumes:
      - ./obsidian_vault:/app/obsidian_vault:ro
    environment:
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb

  # MCP server (remote streamable HTTP style endpoint for Codex CLI clients)
  mcp-server:
    image: davidsmh233/soporte-inteligente-rag-mcp-server
    build:
      context: ./mcp_server
    ports:
      - "8100:8100"
    environment:
      - BACKEND_URL=http://backend:8000
      - MCP_BEARER_TOKEN=${MCP_BEARER_TOKEN}
    depends_on:
      - backend

  # Session gateway (server-side bridge to local Codex CLI agents)
  session-gateway:
    image: davidsmh233/soporte-inteligente-rag-session-gateway
    build:
      context: ./session_gateway
    ports:
      - "9000:9000"
    environment:
      - SESSION_USER_TOKENS=${SESSION_USER_TOKENS}
      - SESSION_SHARED_TOKEN=${SESSION_SHARED_TOKEN}

  # Interfaz web (React servido por Nginx)
  frontend:
    image: davidsmh233/soporte-inteligente-rag-frontend
    build:
      context: ./frontend
    ports:
      - "8501:80"
    environment:
      - BACKEND_URL=http://backend:8000
      - GATEWAY_URL=http://session-gateway:9000
      - DEFAULT_USER_ID=${DEFAULT_USER_ID:-demo}
      - DEFAULT_USER_TOKEN=${DEFAULT_USER_TOKEN:-demo-token}
    depends_on:
      - backend
      - session-gateway

volumes:
  chroma-data:
